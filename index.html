<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tea Taper" />
  <meta name="description" content="Private kratom tea reduction and wellbeing tracker. Not a medical device." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Tea Taper</title>
</head>
<body>
  <noscript>Для работы приложения нужен JavaScript.</noscript>

  <div id="ageGate" class="gate hidden" role="dialog" aria-modal="true">
    <div class="gate-card glass">
      <div class="brand-row">
        <img src="icons/icon-192.png" alt="" class="brand-icon" />
        <div>
          <h1>Tea Taper</h1>
          <p data-i18n="tagline">Личный трекер снижения кратомного чая</p>
        </div>
      </div>
      <div class="notice warn">
        <strong data-i18n="ageTitle">18+ и не медицинское приложение</strong>
        <p data-i18n="ageText">Приложение помогает вести дневник объёма и самочувствия. Оно не диагностирует, не лечит и не заменяет врача.</p>
      </div>
      <label class="check-row">
        <input id="ageConfirm" type="checkbox" />
        <span data-i18n="ageConfirm">Мне 18+ и я понимаю, что это личный трекер, а не медицинская помощь.</span>
      </label>
      <button id="acceptAgeBtn" class="btn primary full" disabled data-i18n="continue">Продолжить</button>
      <button class="btn ghost full" data-action="openDoc" data-doc="disclaimer" data-i18n="readDisclaimer">Открыть дисклеймер</button>
    </div>
  </div>

  <div id="onboarding" class="gate hidden" role="dialog" aria-modal="true">
    <div class="gate-card onboard glass">
      <div class="step-indicator"><span id="onboardStepLabel">1/5</span></div>
      <div id="onboardContent"></div>
      <div class="row gap">
        <button id="onboardBack" class="btn ghost" data-i18n="back">Назад</button>
        <button id="onboardNext" class="btn primary grow" data-i18n="next">Далее</button>
      </div>
    </div>
  </div>

  <div id="lockScreen" class="gate hidden" role="dialog" aria-modal="true">
    <div class="gate-card glass small-card">
      <h1>Tea Taper</h1>
      <p class="muted" data-i18n="pinEnter">Введите PIN</p>
      <input id="pinInput" class="input pin" inputmode="numeric" maxlength="8" type="password" autocomplete="current-password" />
      <button id="unlockBtn" class="btn primary full" data-i18n="unlock">Открыть</button>
      <button id="resetPinBtn" class="btn danger-ghost full" data-i18n="resetPin">Сбросить PIN и локальные данные</button>
    </div>
  </div>

  <div id="appShell" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <img src="icons/icon-192.png" alt="" class="top-icon" />
        <div>
          <div class="app-title">Tea Taper</div>
          <div id="cloudBadge" class="cloud-badge">Local</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="shareAppBtn" aria-label="Share app">↗</button>
        <button class="icon-btn" id="themeBtn" aria-label="Theme">◐</button>
      </div>
    </header>

    <main id="view" class="view"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button data-tab="today" class="nav-item active"><span>●</span><b data-i18n="tabToday">Сегодня</b></button>
      <button data-tab="progress" class="nav-item"><span>▦</span><b data-i18n="tabProgress">Прогресс</b></button>
      <button data-tab="wellbeing" class="nav-item"><span>♡</span><b data-i18n="tabWellbeing">Состояние</b></button>
      <button data-tab="plan" class="nav-item"><span>◇</span><b data-i18n="tabPlan">План</b></button>
      <button data-tab="profile" class="nav-item"><span>☰</span><b data-i18n="tabProfile">Профиль</b></button>
    </nav>
  </div>

  <div id="sheet" class="sheet hidden" aria-hidden="true">
    <div class="sheet-scrim" data-action="closeSheet"></div>
    <div class="sheet-panel" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>
      <div id="sheetContent"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>
  <div id="updateBar" class="update-bar hidden">
    <span data-i18n="updateAvailable">Доступна новая версия</span>
    <button id="updateNowBtn" class="btn tiny primary" data-i18n="updateNow">Обновить</button>
  </div>

  <script src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
